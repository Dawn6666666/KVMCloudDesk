<svg width="980" height="420" viewBox="0 0 980 420" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="d7-g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f8fafc"/>
        </linearGradient>
        <filter id="d7-sh" x="-8%" y="-8%" width="116%" height="116%">
            <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.04"/>
        </filter>
        <marker id="d7-arr-slate" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
        </marker>
        <marker id="d7-arr-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 z" fill="#ea580c"/>
        </marker>
        <marker id="d7-arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 z" fill="#16a34a"/>
        </marker>
    </defs>
    <rect width="980" height="420" fill="#ffffff" />
    <text x="490" y="35" text-anchor="middle" fill="#0f172a" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="800">后端双模式服务结构图</text>

    <!-- Connections -->
    <path d="M 180 210 L 250 210" stroke="#64748b" stroke-width="1.5" marker-end="url(#d7-arr-slate)"/>
    <path d="M 390 210 Q 450 130, 520 130" stroke="#ea580c" stroke-width="1.5" marker-end="url(#d7-arr-orange)"/>
    <path d="M 390 210 Q 450 290, 520 290" stroke="#16a34a" stroke-width="1.5" marker-end="url(#d7-arr-green)"/>
    <path d="M 660 290 L 730 290" stroke="#16a34a" stroke-width="1.5" marker-end="url(#d7-arr-green)"/>
    <path d="M 850 290 L 880 290" stroke="#16a34a" stroke-width="1.5" marker-end="url(#d7-arr-green)"/>

    <!-- Badges -->
    <g transform="translate(450, 150)">
        <rect x="-35" y="-10" width="70" height="20" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
        <text x="0" y="4" text-anchor="middle" fill="#c2410c" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">Windows 开发</text>
    </g>
    <g transform="translate(450, 270)">
        <rect x="-35" y="-10" width="70" height="20" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
        <text x="0" y="4" text-anchor="middle" fill="#15803d" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">CentOS 部署</text>
    </g>

    <!-- Nodes -->
    <g transform="translate(40, 180)" filter="url(#d7-sh)">
        <rect width="140" height="60" rx="8" fill="url(#d7-g)" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="70" y="34" text-anchor="middle" fill="#1e3a8a" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">控制器</text>
    </g>
    <g transform="translate(250, 180)" filter="url(#d7-sh)">
        <rect width="140" height="60" rx="8" fill="url(#d7-g)" stroke="#475569" stroke-width="1.5"/>
        <text x="70" y="34" text-anchor="middle" fill="#0f172a" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">服务接口</text>
    </g>
    <g transform="translate(520, 100)" filter="url(#d7-sh)">
        <rect width="140" height="60" rx="8" fill="url(#d7-g)" stroke="#ea580c" stroke-width="1.5"/>
        <text x="70" y="28" text-anchor="middle" fill="#7c2d12" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">模拟实现</text>
        <text x="70" y="44" text-anchor="middle" fill="#ea580c" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="500">内存数据读写</text>
    </g>
    <g transform="translate(520, 260)" filter="url(#d7-sh)">
        <rect width="140" height="60" rx="8" fill="url(#d7-g)" stroke="#16a34a" stroke-width="1.5"/>
        <text x="70" y="28" text-anchor="middle" fill="#15803d" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">真实实现</text>
        <text x="70" y="44" text-anchor="middle" fill="#16a34a" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="500">调用底层接口</text>
    </g>
    <g transform="translate(730, 265)" filter="url(#d7-sh)">
        <rect width="120" height="50" rx="8" fill="url(#d7-g)" stroke="#cbd5e1" stroke-width="1.2"/>
        <text x="60" y="28" text-anchor="middle" fill="#3f3f46" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">JNA 动态加载</text>
    </g>
    <g transform="translate(880, 265)" filter="url(#d7-sh)">
