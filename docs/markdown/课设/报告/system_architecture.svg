<svg width="980" height="420" viewBox="0 0 980 420" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="d5-g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f8fafc"/>
        </linearGradient>
        <filter id="d5-sh" x="-8%" y="-8%" width="116%" height="116%">
            <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.04"/>
        </filter>
        <marker id="d5-arr-slate" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
        </marker>
        <marker id="d5-arr-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 z" fill="#ea580c"/>
        </marker>
        <marker id="d5-arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 z" fill="#16a34a"/>
        </marker>
    </defs>
    <rect width="980" height="420" fill="#ffffff" />
    <text x="490" y="35" text-anchor="middle" fill="#0f172a" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="800">系统总体部署架构图</text>

    <!-- Horizontal Connections -->
    <path d="M 180 210 L 320 210" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#d5-arr-slate)"/>
    <path d="M 460 210 L 520 210" stroke="#64748b" stroke-width="1.5" marker-end="url(#d5-arr-slate)"/>
    <path d="M 640 210 Q 700 130, 760 130" stroke="#ea580c" stroke-width="1.5" marker-end="url(#d5-arr-orange)"/>
    <path d="M 640 210 Q 700 290, 760 290" stroke="#16a34a" stroke-width="1.5" marker-end="url(#d5-arr-green)"/>
    <path d="M 870 290 L 890 290" stroke="#16a34a" stroke-width="1.5" marker-end="url(#d5-arr-green)"/>

    <!-- Badges -->
    <g transform="translate(250, 210)">
        <rect x="-35" y="-10" width="70" height="20" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
        <text x="0" y="4" text-anchor="middle" fill="#64748b" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">HTTP 协议</text>
    </g>
    <g transform="translate(685, 150)">
        <rect x="-35" y="-10" width="70" height="20" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
        <text x="0" y="4" text-anchor="middle" fill="#c2410c" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">Windows 开发</text>
    </g>
    <g transform="translate(685, 270)">
        <rect x="-35" y="-10" width="70" height="20" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
        <text x="0" y="4" text-anchor="middle" fill="#15803d" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600">CentOS 部署</text>
    </g>

    <!-- Nodes -->
    <g transform="translate(40, 180)" filter="url(#d5-sh)">
        <rect width="140" height="60" rx="8" fill="url(#d5-g)" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="70" y="28" text-anchor="middle" fill="#1e3a8a" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">客户端</text>
        <text x="70" y="44" text-anchor="middle" fill="#2563eb" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="500">网页端与桌面端</text>
    </g>
    <g transform="translate(320, 180)" filter="url(#d5-sh)">
        <rect width="140" height="60" rx="8" fill="url(#d5-g)" stroke="#475569" stroke-width="1.5"/>
        <text x="70" y="34" text-anchor="middle" fill="#0f172a" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">控制器层</text>
    </g>
    <g transform="translate(520, 180)" filter="url(#d5-sh)">
        <rect width="120" height="60" rx="8" fill="url(#d5-g)" stroke="#475569" stroke-width="1.5"/>
        <text x="60" y="34" text-anchor="middle" fill="#0f172a" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">业务服务层</text>
    </g>
    <g transform="translate(760, 100)" filter="url(#d5-sh)">
        <rect width="110" height="60" rx="8" fill="url(#d5-g)" stroke="#ea580c" stroke-width="1.5"/>
        <text x="55" y="28" text-anchor="middle" fill="#7c2d12" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">模拟服务</text>
        <text x="55" y="44" text-anchor="middle" fill="#ea580c" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="500">内存假数据</text>
    </g>
    <g transform="translate(760, 260)" filter="url(#d5-sh)">
        <rect width="110" height="60" rx="8" fill="url(#d5-g)" stroke="#16a34a" stroke-width="1.5"/>
        <text x="55" y="28" text-anchor="middle" fill="#15803d" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700">虚拟化服务</text>
        <text x="55" y="44" text-anchor="middle" fill="#16a34a" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="500">JNA 加载</text>
    </g>
    <g transform="translate(890, 265)" filter="url(#d5-sh)">
        <rect width="70" height="50" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
        <text x="35" y="29" text-anchor="middle" fill="#4c1d95" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="700">KVM</text>
    </g>
</svg>
