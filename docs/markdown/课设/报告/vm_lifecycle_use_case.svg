        <marker id="d4-arr-red-dark" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 z" fill="#b91c1c"/>
        </marker>
