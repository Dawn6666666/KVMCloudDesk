        <text class="svg-label-text" x="0" y="4" text-anchor="middle" fill="#475569">创建</text>
    </g>
    <g transform="translate(310, 165)">
        <rect x="-20" y="-9" width="40" height="18" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
        <text class="svg-label-text" x="0" y="4" text-anchor="middle" fill="#475569">启动</text>
    </g>
    <g transform="translate(600, 155)">
        <rect x="-20" y="-9" width="40" height="18" rx="9" fill="#ffffff" stroke="#fed7aa" stroke-width="1"/>
        <text class="svg-label-text" x="0" y="4" text-anchor="middle" fill="#c2410c">暂停</text>
    </g>
    <g transform="translate(600, 175)">
        <rect x="-20" y="-9" width="40" height="18" rx="9" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
        <text class="svg-label-text" x="0" y="4" text-anchor="middle" fill="#15803d">恢复</text>
    </g>
    <g transform="translate(430, 235)">
        <rect x="-30" y="-9" width="60" height="18" rx="9" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
        <text class="svg-label-text" x="0" y="4" text-anchor="middle" fill="#b91c1c">安全关机</text>
    </g>
    <g transform="translate(480, 305)">
        <rect x="-30" y="-9" width="60" height="18" rx="9" fill="#ffffff" stroke="#fee2e2" stroke-width="1"/>
        <text class="svg-label-text" x="0" y="4" text-anchor="middle" fill="#991b1b">强制断电</text>
    </g>
    <g transform="translate(620, 270)">
        <rect x="-30" y="-9" width="60" height="18" rx="9" fill="#ffffff" stroke="#fee2e2" stroke-width="1"/>
        <text class="svg-label-text" x="0" y="4" text-anchor="middle" fill="#991b1b">强制断电</text>
    </g>
    <g transform="translate(310, 270)">
        <rect x="-20" y="-9" width="40" height="18" rx="9" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
        <text class="svg-label-text" x="0" y="4" text-anchor="middle" fill="#15803d">启动</text>
    </g>
    <g transform="translate(595, 375)">
        <rect x="-20" y="-9" width="40" height="18" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
        <text class="svg-label-text" x="0" y="4" text-anchor="middle" fill="#475569">删除</text>
    </g>

    <circle cx="50" cy="165" r="5" fill="#64748b" />
    <circle cx="870" cy="375" r="5" fill="#64748b" />
    <circle cx="870" cy="375" r="10" stroke="#64748b" stroke-width="1.5" fill="none" />

    <g transform="translate(130, 140)" filter="url(#d4-sh)">
        <rect width="100" height="50" rx="8" fill="url(#d4-g-def)" stroke="#cbd5e1" stroke-width="1.5"/>
        <text class="svg-node-text" x="50" y="29" text-anchor="middle" fill="#1e293b">已定义</text>
    </g>
    <g transform="translate(390, 140)" filter="url(#d4-sh)">
        <rect width="130" height="50" rx="8" fill="url(#d4-g-run)" stroke="#10b981" stroke-width="2"/>
        <text class="svg-node-text" x="65" y="29" text-anchor="middle" fill="#14532d">运行中</text>
    </g>
    <g transform="translate(680, 140)" filter="url(#d4-sh)">
        <rect width="130" height="50" rx="8" fill="url(#d4-g-pause)" stroke="#fbbf24" stroke-width="1.5"/>
        <text class="svg-node-text" x="65" y="29" text-anchor="middle" fill="#78350f">已暂停</text>
    </g>
    <g transform="translate(390, 350)" filter="url(#d4-sh)">
        <rect width="130" height="50" rx="8" fill="url(#d4-g-shut)" stroke="#f87171" stroke-width="1.5"/>
        <text class="svg-node-text" x="65" y="29" text-anchor="middle" fill="#7f1d1d">已关闭</text>
    </g>
    <g transform="translate(680, 350)" filter="url(#d4-sh)">
        <rect width="130" height="50" rx="8" fill="url(#d4-g-del)" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3"/>
        <text class="svg-node-text" x="65" y="29" text-anchor="middle" fill="#3f3f46">已删除</text>
