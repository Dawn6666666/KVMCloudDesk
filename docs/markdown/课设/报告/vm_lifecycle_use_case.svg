    <rect width="980" height="500" fill="#ffffff" />
    <text class="svg-title" x="490" y="35" text-anchor="middle" fill="#0f172a">虚拟机生命周期状态流转图</text>
    
    <path d="M 60 165 L 130 165" stroke="#64748b" stroke-width="1.5" marker-end="url(#d4-arr-slate)"/>
    <path d="M 230 165 L 390 165" stroke="#64748b" stroke-width="1.5" marker-end="url(#d4-arr-slate)"/>
    <path d="M 520 155 L 680 155" stroke="#ea580c" stroke-width="1.5" marker-end="url(#d4-arr-orange)"/>
    <path d="M 680 175 L 525 175" stroke="#16a34a" stroke-width="1.5" marker-end="url(#d4-arr-green)"/>
    <path d="M 430 190 L 430 350" stroke="#ef4444" stroke-width="1.5" marker-end="url(#d4-arr-red)"/>
    <path d="M 480 190 L 480 350" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#d4-arr-red-dark)"/>
    <path d="M 720 190 L 515 350" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#d4-arr-red-dark)"/>
    <path d="M 410 375 C 310 375, 310 165, 395 165" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#d4-arr-green)"/>
    <path d="M 520 375 L 680 375" stroke="#64748b" stroke-width="1.5" marker-end="url(#d4-arr-slate)"/>
    <path d="M 810 375 L 860 375" stroke="#64748b" stroke-width="1.5" marker-end="url(#d4-arr-slate)"/>

    <g transform="translate(95, 165)">
