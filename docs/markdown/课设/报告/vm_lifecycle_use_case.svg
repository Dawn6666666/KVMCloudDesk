<svg width="980" height="500" viewBox="0 0 980 500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        svg {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        }
        .svg-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        .svg-node-text {
            font-size: 13px;
            font-weight: 700;
        }
        .svg-node-sub {
            font-size: 10px;
            font-weight: 500;
        }
        .svg-label-text {
            font-size: 11px;
            font-weight: 600;
        }
    </style>
    <defs>
        <linearGradient id="d4-g-def" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f1f5f9"/>
        </linearGradient>
        <linearGradient id="d4-g-run" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ecfdf5"/><stop offset="100%" stop-color="#d1fae5"/>
        </linearGradient>
        <linearGradient id="d4-g-pause" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fffbeb"/><stop offset="100%" stop-color="#fef3c7"/>
        </linearGradient>
        <linearGradient id="d4-g-shut" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fef2f2"/><stop offset="100%" stop-color="#fee2e2"/>
        </linearGradient>
        <linearGradient id="d4-g-del" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#f1f5f9"/>
        </linearGradient>
        <filter id="d4-sh" x="-8%" y="-8%" width="116%" height="116%">
            <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.04"/>
        </filter>
        <marker id="d4-arr-slate" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
        </marker>
        <marker id="d4-arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 z" fill="#16a34a"/>
        </marker>
        <marker id="d4-arr-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 z" fill="#ea580c"/>
        </marker>
        <marker id="d4-arr-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 z" fill="#ef4444"/>
